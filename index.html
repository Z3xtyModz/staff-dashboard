<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic SMP — Staff Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05060a;
    --bg-elevated: #0a0c12;
    --surface: rgba(255,255,255,0.025);
    --surface-hover: rgba(255,255,255,0.055);
    --border: rgba(255,255,255,0.06);
    --border-soft: rgba(255,255,255,0.03);
    --text-primary: #eef0f6;
    --text-secondary: #7d829a;
    --text-muted: #3e4256;
    --accent: #a78bfa;
    --accent-bright: #c4b5fd;
    --accent-dim: #5b3f9e;
    --cyan: #22d3ee;
    --danger: #f87171;
    --danger-dim: rgba(248,113,113,0.1);
    --danger-glow: rgba(248,113,113,0.3);
    --warn: #fbbf24;
    --warn-dim: rgba(251,191,36,0.1);
    --warn-glow: rgba(251,191,36,0.25);
    --success: #34d399;
    --success-dim: rgba(52,211,153,0.1);
    --radius-xl: 28px;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 12px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text-primary); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  ::selection { background: var(--accent-dim); color: white; }

  #cosmos { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  #cosmos canvas { width: 100%; height: 100%; }
  .nebula { position: fixed; border-radius: 50%; filter: blur(130px); pointer-events: none; z-index: 0; }
  .neb-1 { width: 700px; height: 700px; top: -250px; left: -150px; background: radial-gradient(circle, rgba(99,50,180,0.35), transparent 70%); animation: d1 22s ease-in-out infinite; }
  .neb-2 { width: 550px; height: 550px; bottom: -200px; right: -120px; background: radial-gradient(circle, rgba(14,107,115,0.3), transparent 70%); animation: d2 28s ease-in-out infinite; }
  .neb-3 { width: 400px; height: 400px; top: 35%; left: 55%; background: radial-gradient(circle, rgba(167,139,250,0.15), transparent 65%); animation: d3 19s ease-in-out infinite; }
  .neb-4 { width: 300px; height: 300px; top: 60%; left: 10%; background: radial-gradient(circle, rgba(248,113,113,0.08), transparent 65%); animation: d1 15s ease-in-out infinite reverse; }
  @keyframes d1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(50px,40px) scale(1.12)}66%{transform:translate(-30px,60px) scale(.93)}}
  @keyframes d2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-60px,-50px) scale(1.18)}}
  @keyframes d3{0%,100%{transform:translate(0,0)}50%{transform:translate(70px,-35px)}}

  .grid-overlay { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px); background-size: 80px 80px; mask-image: radial-gradient(ellipse at 50% 30%, black 20%, transparent 70%); -webkit-mask-image: radial-gradient(ellipse at 50% 30%, black 20%, transparent 70%); }
  .noise { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 200px; }
  .vignette { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.5) 100%); }

  .shell { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; }

  .filters-wrap { display: flex; align-items: center; gap: 8px; padding: 24px 32px 0; flex-wrap: wrap; }
  .filter-pill { background: var(--surface); border: 1px solid var(--border-soft); color: var(--text-secondary); padding: 8px 16px; border-radius: 14px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.3s var(--ease); font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(8px); position: relative; overflow: hidden; user-select: none; }
  .filter-pill::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(167,139,250,0.1),rgba(34,211,238,0.05)); opacity:0; transition:opacity .3s var(--ease); }
  .filter-pill:hover { background: var(--surface-hover); color: var(--text-primary); border-color: var(--border); }
  .filter-pill:active { transform: scale(0.96); }
  .filter-pill.active { background: rgba(167,139,250,0.08); border-color: rgba(167,139,250,0.2); color: var(--accent-bright); box-shadow: 0 0 24px rgba(167,139,250,0.06), inset 0 1px 0 rgba(255,255,255,0.03); }
  .filter-pill.active::before { opacity: 1; }
  .filter-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); background: rgba(255,255,255,0.04); padding: 2px 8px; border-radius: 99px; min-width: 22px; text-align: center; }
  .filter-pill.active .filter-count { background: rgba(167,139,250,0.15); color: var(--accent-bright); }

  .container { padding: 20px 32px 90px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

  .skeleton-card { height: 240px; border-radius: var(--radius-xl); background: linear-gradient(100deg, rgba(255,255,255,0.015) 40%, rgba(255,255,255,0.04) 50%, rgba(255,255,255,0.015) 60%); background-size: 200% 100%; animation: shimmer 1.6s ease-in-out infinite; border: 1px solid var(--border-soft); }
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  .card { position: relative; border-radius: var(--radius-xl); cursor: pointer; transition: transform 0.45s var(--ease-out), box-shadow 0.45s var(--ease-out); opacity: 0; animation: cardIn 0.6s var(--ease-out) forwards; overflow: hidden; }
  @keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
  .card-border { position: absolute; inset: 0; border-radius: var(--radius-xl); padding: 1px; background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02), rgba(255,255,255,0.04)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; z-index: 3; }
  .card-glow-border { position: absolute; inset: -1px; border-radius: calc(var(--radius-xl) + 1px); padding: 1.5px; background: conic-gradient(from var(--glow-angle, 0deg), transparent 0%, var(--glow-color, rgba(167,139,250,0.4)) 10%, transparent 20%, transparent 80%, var(--glow-color, rgba(167,139,250,0.2)) 90%, transparent 100%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity 0.5s var(--ease); pointer-events: none; z-index: 2; animation: rotateGlow 4s linear infinite; }
  @property --glow-angle{syntax:'<angle>';initial-value:0deg;inherits:false}
  @keyframes rotateGlow{to{--glow-angle:360deg}}
  .card:hover .card-glow-border { opacity: 1; }
  .card-inner { position: relative; z-index: 1; background: rgba(8,9,14,0.85); border-radius: calc(var(--radius-xl) - 1px); padding: 24px; backdrop-filter: blur(12px); overflow: hidden; height: 100%; }
  .card-inner::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 15% 0%,rgba(167,139,250,0.06),transparent 50%); opacity:0; transition:opacity .4s var(--ease); pointer-events:none; }
  .card:hover .card-inner::before { opacity: 1; }
  .card-mouse-glow { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(167,139,250,0.08), transparent 60%); pointer-events: none; z-index: 0; opacity: 0; transition: opacity 0.3s; transform: translate(-50%, -50%); }
  .card:hover .card-mouse-glow { opacity: 1; }
  .card:hover { transform: translateY(-8px) scale(1.015); box-shadow: 0 32px 64px -20px rgba(0,0,0,0.7), 0 0 80px -30px rgba(167,139,250,0.12); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; position: relative; }
  .card-identity { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .card-head-wrap { position: relative; flex-shrink: 0; }
  .card-head-glow { position: absolute; inset: -5px; border-radius: 20px; background: linear-gradient(135deg, var(--accent), var(--cyan)); opacity: 0; filter: blur(12px); transition: opacity 0.4s var(--ease); z-index: 0; }
  .card:hover .card-head-glow { opacity: 0.4; }
  .card-head { width: 48px; height: 48px; border-radius: 16px; border: 1px solid var(--border); background: var(--bg-elevated); box-shadow: 0 4px 16px rgba(0,0,0,0.6); flex-shrink: 0; image-rendering: pixelated; position: relative; z-index: 1; transition: border-color 0.3s var(--ease), transform 0.4s var(--ease); }
  .card:hover .card-head { border-color: rgba(167,139,250,0.25); transform: scale(1.05); }
  .card-name { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.4px; }
  .card-status { font-size: 10.5px; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 6px; letter-spacing: 0.3px; }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; position: relative; }
  .status-dot::after { content:''; position:absolute; inset:-4px; border-radius:50%; background:inherit; opacity:.25; filter:blur(4px); }
  .risk-ring-wrap { flex-shrink: 0; width: 56px; height: 56px; position: relative; }
  .risk-ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .risk-ring-bg { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 3; }
  .risk-ring-fg { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s var(--ease-out), stroke 0.5s var(--ease); filter: drop-shadow(0 0 5px currentColor); }
  .risk-ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .risk-ring-num { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; line-height: 1; letter-spacing: -0.5px; }
  .risk-ring-label { font-family: 'JetBrains Mono', monospace; font-size: 7px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .risk-bar-wrap { margin-top: 18px; }
  .risk-bar-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .risk-bar-label span { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .risk-bar-track { width: 100%; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.04); overflow: hidden; }
  .risk-bar-fill { height: 100%; border-radius: 2px; transition: width 1s var(--ease-out), background 0.5s var(--ease); position: relative; }
  .risk-bar-fill::after { content:''; position:absolute; right:0; top:-2px; bottom:-2px; width:8px; border-radius:4px; background:inherit; filter:blur(4px); opacity:.8; }
  .card-badges { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; background: rgba(255,255,255,0.025); border: 1px solid var(--border-soft); border-radius: 14px; font-size: 10.5px; font-family: 'JetBrains Mono', monospace; color: var(--text-secondary); }
  .badge.danger { color: var(--danger); border-color: rgba(248,113,113,0.12); background: var(--danger-dim); box-shadow: 0 0 16px rgba(248,113,113,0.05); }
  .badge.warn { color: var(--warn); border-color: rgba(251,191,36,0.12); background: var(--warn-dim); box-shadow: 0 0 16px rgba(251,191,36,0.05); }
  .card-footer { margin-top: 16px; display: flex; align-items: center; justify-content: space-between; }
  .card-time { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
  .view-btn { padding: 7px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border-soft); background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.3s var(--ease); letter-spacing: 0.3px; }
  .card:hover .view-btn { border-color: rgba(167,139,250,0.25); color: var(--accent-bright); background: rgba(167,139,250,0.06); box-shadow: 0 0 16px rgba(167,139,250,0.06); }

  /* ======== PANEL ======== */
  .overlay { position: fixed; inset: 0; background: rgba(2,2,4,0.75); backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity 0.4s var(--ease); z-index: 40; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .panel { position: fixed; top: 0; right: 0; height: 100%; width: min(500px, 94vw); background: rgba(8,9,14,0.92); border-left: 1px solid var(--border-soft); transform: translateX(100%); transition: transform 0.5s var(--ease-out); z-index: 41; overflow-y: auto; overflow-x: hidden; padding-bottom: 60px; backdrop-filter: blur(40px) saturate(1.2); box-shadow: -40px 0 100px -30px rgba(0,0,0,0.8); }
  .panel.open { transform: translateX(0); }
  .panel::before { content:''; position:absolute; top:0; left:0; right:0; height:350px; background:radial-gradient(ellipse at 20% 0%,rgba(167,139,250,0.1),transparent 60%); pointer-events:none; }
  .panel-header { padding: 36px 30px 28px; border-bottom: 1px solid var(--border-soft); position: relative; }
  .panel-close { position: absolute; top: 30px; right: 30px; width: 38px; height: 38px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s var(--ease); }
  .panel-close:hover { background: var(--surface-hover); color: var(--text-primary); transform: rotate(90deg); border-color: rgba(167,139,250,0.2); }
  .panel-identity { display: flex; align-items: center; gap: 22px; }
  .panel-head-wrap { position: relative; flex-shrink: 0; }
  .panel-head-glow { position: absolute; inset: -10px; border-radius: 36px; background: linear-gradient(135deg, var(--accent), var(--cyan)); opacity: 0.3; filter: blur(20px); z-index: 0; animation: phg 3s ease-in-out infinite; }
  @keyframes phg{0%,100%{opacity:.25}50%{opacity:.4}}
  .panel-head { width: 92px; height: 92px; border-radius: 28px; border: 1px solid rgba(167,139,250,0.15); background: var(--bg-elevated); box-shadow: 0 8px 32px rgba(0,0,0,0.7); flex-shrink: 0; image-rendering: pixelated; position: relative; z-index: 1; }
  .panel-name { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.6px; }
  .panel-uuid { font-size: 10.5px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
  .risk-readout { margin-top: 14px; display: flex; align-items: center; gap: 16px; }
  .panel-risk-ring { width: 52px; height: 52px; position: relative; flex-shrink: 0; }
  .panel-risk-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .panel-risk-ring .risk-ring-num { font-size: 14px; }
  .panel-risk-ring .risk-ring-label { display: none; }
  .risk-meta-text { display: flex; flex-direction: column; gap: 2px; }
  .risk-meta-label { font-size: 9px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1.2px; }
  .risk-meta-value { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.6px; }
  .panel-risk-bar { margin-top: 20px; }
  .panel-risk-bar .risk-bar-track { height: 5px; }

  .tabs { display: flex; gap: 2px; padding: 18px 30px 0; border-bottom: 1px solid var(--border-soft); }
  .tab { padding: 12px 20px; font-size: 12.5px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.3s var(--ease); font-family: 'Inter', sans-serif; position: relative; }
  .tab.active { color: var(--accent-bright); border-color: var(--accent); }
  .tab.active::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:10px; background:linear-gradient(to top,rgba(167,139,250,0.08),transparent); pointer-events:none; }
  .tab:hover:not(.active) { color: var(--text-secondary); }
  .tab-content { padding: 24px 30px; display: none; }
  .tab-content.active { display: block; }

  .timeline { position: relative; padding-left: 28px; }
  .timeline::before { content:''; position:absolute; left:7px; top:8px; bottom:8px; width:1px; background:linear-gradient(to bottom,var(--border),transparent); }
  .timeline-item { position: relative; padding-bottom: 16px; opacity: 0; animation: tiIn 0.45s var(--ease-out) forwards; }
  @keyframes tiIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
  .timeline-item:last-child { padding-bottom: 0; }
  .timeline-node { position: absolute; left: -28px; top: 6px; width: 15px; height: 15px; border-radius: 5px; background: var(--bg-elevated); border: 2px solid var(--accent-dim); }
  .timeline-node.danger { border-color: var(--danger); background: var(--danger-dim); box-shadow: 0 0 14px var(--danger-glow); }
  .timeline-node.warn { border-color: var(--warn); background: var(--warn-dim); box-shadow: 0 0 14px var(--warn-glow); }
  .tl-card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius-md); padding: 14px 16px; transition: all 0.3s var(--ease); }
  .tl-card:hover { background: var(--surface-hover); border-color: var(--border); }
  .timeline-title { font-size: 13px; font-weight: 600; margin: 0 0 4px; display: flex; align-items: center; gap: 8px; }
  .timeline-meta { font-size: 10.5px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
  .vl-tag { display: inline-flex; padding: 2px 10px; border-radius: 8px; background: var(--danger-dim); color: var(--danger); font-size: 10px; font-family: 'JetBrains Mono', monospace; font-weight: 500; }

  .list-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border-soft); opacity: 0; animation: tiIn 0.45s var(--ease-out) forwards; }
  .list-item:last-child { border-bottom: none; }
  .list-icon { width: 40px; height: 40px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 17px; transition: all 0.3s var(--ease); }
  .list-item:hover .list-icon { border-color: rgba(167,139,250,0.2); background: var(--surface-hover); }
  .list-text { flex: 1; min-width: 0; }
  .list-title { font-size: 13px; font-weight: 500; margin: 0 0 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-sub { font-size: 10.5px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
  .list-time { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; text-align: right; }

  /* Quick actions in panel */
  .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .qaction { display: flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border-soft); background: var(--surface); color: var(--text-secondary); font-size: 12px; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.25s var(--ease); user-select: none; }
  .qaction:active { transform: scale(0.95); }
  .qdot { width: 7px; height: 7px; border-radius: 3px; flex-shrink: 0; }
  .qaction[data-color="danger"] .qdot { background: var(--danger); box-shadow: 0 0 8px var(--danger-glow); }
  .qaction[data-color="danger"]:hover { border-color: rgba(248,113,113,0.2); color: var(--danger); background: var(--danger-dim); }
  .qaction[data-color="warn"] .qdot { background: var(--warn); box-shadow: 0 0 8px var(--warn-glow); }
  .qaction[data-color="warn"]:hover { border-color: rgba(251,191,36,0.2); color: var(--warn); background: var(--warn-dim); }
  .qaction[data-color="accent"] .qdot { background: var(--accent); box-shadow: 0 0 8px rgba(167,139,250,0.3); }
  .qaction[data-color="accent"]:hover { border-color: rgba(167,139,250,0.2); color: var(--accent-bright); background: rgba(167,139,250,0.08); }
  .qaction[data-color="cyan"] .qdot { background: var(--cyan); box-shadow: 0 0 8px rgba(34,211,238,0.3); }
  .qaction[data-color="cyan"]:hover { border-color: rgba(34,211,238,0.2); color: var(--cyan); background: rgba(34,211,238,0.08); }
  .qaction[data-color="neutral"] .qdot { background: var(--text-muted); }
  .qaction[data-color="neutral"]:hover { border-color: var(--border); color: var(--text-primary); background: var(--surface-hover); }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 13px; }
  .empty-icon { font-size: 36px; margin-bottom: 14px; opacity: 0.35; }

  /* ======== BOTTOM TERMINAL ======== */
  .terminal-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 42;
    background: rgba(6,7,11,0.92);
    backdrop-filter: blur(32px) saturate(1.3);
    border-top: 1px solid var(--border-soft);
    box-shadow: 0 -20px 60px -20px rgba(0,0,0,0.7);
  }

  .terminal-wrap::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 0;
    right: 0;

<script>
/* ======== STARFIELD ======== */
(function(){
  const c=document.getElementById('starfield'),ctx=c.getContext('2d');
  let stars=[],ss=[];const N=150;
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  function make(){stars=[];for(let i=0;i<N;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.1+0.2,a:Math.random()*0.4+0.08,sp:Math.random()*0.12+0.015,ph:Math.random()*6.28,tw:Math.random()*0.008+0.003});}
  let t=0;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);t++;
    for(const s of stars){const a=s.a+Math.sin(t*s.tw+s.ph)*0.12;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fillStyle=`rgba(190,185,220,${Math.max(0.02,a)})`;ctx.fill();s.y+=s.sp;if(s.y>c.height+5){s.y=-5;s.x=Math.random()*c.width;}}
    if(Math.random()<0.003&&ss.length<2){ss.push({x:Math.random()*c.width,y:Math.random()*c.height*0.5,vx:(Math.random()-0.3)*8,vy:Math.random()*4+3,life:1,len:Math.random()*60+40});}
    for(let i=ss.length-1;i>=0;i--){const s=ss[i];s.x+=s.vx;s.y+=s.vy;s.life-=0.02;if(s.life<=0){ss.splice(i,1);continue;}const g=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*s.len/8,s.y-s.vy*s.len/8);g.addColorStop(0,`rgba(200,190,255,${s.life*0.6})`);g.addColorStop(1,'rgba(200,190,255,0)');ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*s.len/8,s.y-s.vy*s.len/8);ctx.strokeStyle=g;ctx.lineWidth=1.2;ctx.stroke();}
    requestAnimationFrame(draw);
  }
  resize();make();draw();addEventListener('resize',()=>{resize();make();});
})();

/* ======== SUPABASE ======== */
const SB_URL='https://hcvsdlzqnakzeprouths.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdnNkbHpxbmFremVwcm91dGhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNDUyMTYsImV4cCI6MjA5ODYyMTIxNn0.ep5pc_9gQTgeHuMDU84NO3RNLFiuBysO7PBhWUewO2M';
const sb=supabase.createClient(SB_URL,SB_KEY);

function stopDashboard(){
  if (realtimeChannel) { sb.removeChannel(realtimeChannel); realtimeChannel = null; }
  if (cmdChannel) { sb.removeChannel(cmdChannel); cmdChannel = null; }
  players = [];
  grid.innerHTML = '';
}

function startDashboard(){
  grid.innerHTML=Array.from({length:6}).map(()=>`<div class="skeleton-card"></div>`).join('');
  loadPlayers();
  subscribeRealtime();
}

function fmtTime(iso){
  const d=new Date(iso),n=Date.now(),df=n-d,m=Math.floor(df/60000);
  if(m<1)return'just now';if(m<60)return m+'m ago';
  const h=Math.floor(m/60);if(h<24)return h+'h ago';
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}

async function loadPlayers(){
  const[{data:pr,error:pE},{data:ar,error:aE},{data:pur,error:puE},{data:sr,error:sE}]=await Promise.all([
    sb.from('players').select('*').order('risk',{ascending:false}),
    sb.from('alerts').select('*').order('created_at',{ascending:false}),
    sb.from('punishments').select('*').order('created_at',{ascending:false}),
    sb.from('staff_actions').select('*').order('created_at',{ascending:false})
  ]);
  const e=pE||aE||puE||sE;
  if(e){grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">⚠️</div>Error: ${[e.message,e.code].filter(Boolean).join(' ')}</div>`;return;}
  players=pr.map(p=>({
    name:p.name,uuid:p.id,status:p.status,online:p.online,risk:p.risk,
    alerts:ar.filter(a=>a.player_id===p.id).map(a=>({check:a.check_type,vl:a.vl,time:fmtTime(a.created_at),severity:a.severity})),
    punishments:pur.filter(x=>x.player_id===p.id).map(x=>({type:x.type,detail:x.detail,time:fmtTime(x.created_at)})),
    staffActions:sr.filter(x=>x.player_id===p.id).map(x=>({action:x.action,staff:x.staff,time:fmtTime(x.created_at)}))
  }));
  renderGrid();
}

const deb=(fn,d)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),d);}};
const reload=deb(loadPlayers,400);

function subscribeRealtime(){
  realtimeChannel = sb.channel('dash')
    .on('postgres_changes',{event:'*',schema:'public',table:'players'},()=>reload())
    .on('postgres_changes',{event:'*',schema:'public',table:'alerts'},()=>reload())
    .on('postgres_changes',{event:'*',schema:'public',table:'punishments'},()=>reload())
    .on('postgres_changes',{event:'*',schema:'public',table:'staff_actions'},()=>reload())
    .subscribe();

  cmdChannel = sb.channel('term-cmd-updates')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'command_queue'},(payload)=>{
      const updated=payload.new;
      const entry=termLogInner.querySelector(`[data-row-id="${updated.id}"]`);
      if(!entry)return;
      entry.removeAttribute('data-row-id');
      const iconEl=entry.querySelector('.tle-icon');
      if(updated.status==='executed'){
        iconEl.innerHTML=CHECK_SVG;
      } else {
        iconEl.innerHTML=FAIL_SVG;
        if(updated.result){
          const err=document.createElement('span');
          err.className='tle-result';
          err.textContent=updated.result;
          entry.appendChild(err);
        }
      }
    })
    .subscribe();
}

/* ======== HELPERS ======== */
const SM={sus:{color:'var(--warn)',label:'In Screenshare'},banned:{color:'var(--danger)',label:'Banned'},clear:{color:'var(--accent)',label:'Clear'}};
function rHex(r){return r>=70?'#f87171':r>=35?'#fbbf24':'#a78bfa';}
function rGlow(r){return r>=70?'rgba(248,113,113,0.35)':r>=35?'rgba(251,191,36,0.3)':'rgba(167,139,250,0.3)';}
function ringSVG(risk,sz,sw){const r=(sz-sw*2)/2,circ=2*Math.PI*r,off=circ-(circ*Math.min(risk,100))/100,c=rHex(risk);return`<svg viewBox="0 0 ${sz} ${sz}"><circle class="risk-ring-bg" cx="${sz/2}" cy="${sz/2}" r="${r}" stroke-width="${sw}"/><circle class="risk-ring-fg" cx="${sz/2}" cy="${sz/2}" r="${r}" stroke="${c}" stroke-width="${sw}" stroke-dasharray="${circ}" stroke-dashoffset="${off}" style="color:${c}"/></svg>`;}
function riskBarHTML(risk){const c=rHex(risk),g=rGlow(risk);return`<div class="risk-bar-wrap"><div class="risk-bar-label"><span>threat level</span><span style="color:${c}">${risk}%</span></div><div class="risk-bar-track"><div class="risk-bar-fill" style="width:${risk}%;background:linear-gradient(90deg,${c}88,${c});box-shadow:0 0 12px ${g}"></div></div></div>`;}
const FALLBACK='data:image/svg+xml;utf8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" fill="#14151e" rx="4"/><rect x="16" y="14" width="32" height="32" rx="3" fill="#22243a"/><rect x="22" y="26" width="6" height="6" rx="1" fill="#0a0b12"/><rect x="36" y="26" width="6" height="6" rx="1" fill="#0a0b12"/></svg>`);
function hUrl(u,s){return`https://mc-heads.net/avatar/${u}/${s}`;}
function hUrlB(u,s){return`https://crafatar.com/avatars/${u}?size=${s}&overlay`;}
function hFallback(img,u,s){let st=0;img.onerror=function(){st++;if(st===1)this.src=hUrlB(u,s);else{this.onerror=null;this.src=FALLBACK;}};}
function isFlagged(p){return p.status!=='clear'||p.alerts.length||p.punishments.length;}
function matchCat(p,k){if(k==='all')return true;if(k==='sus')return p.status==='sus';if(k==='banned')return p.status==='banned';if(k==='alerted')return p.status==='clear'&&p.alerts.length>0;return true;}

/* ======== GRID ======== */
const grid=document.getElementById('grid');
let activeFilter='all';

function renderGrid(){
  const flagged=players.filter(isFlagged);
  const filtered=flagged.filter(p=>matchCat(p,activeFilter));
  ['all','sus','banned','alerted'].forEach(k=>{document.getElementById('count-'+k).textContent=flagged.filter(p=>matchCat(p,k)).length;});
  if(!filtered.length){grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">✨</div>No flagged players match this filter.</div>`;return;}
  grid.innerHTML=filtered.map((p,i)=>{const m=SM[p.status],gc=rGlow(p.risk);return`<div class="card" data-name="${p.name}" style="animation-delay:${Math.min(i*55,450)}ms;--glow-color:${gc}"><div class="card-glow-border"></div><div class="card-border"></div><div class="card-inner"><div class="card-mouse-glow"></div><div class="card-top"><div class="card-identity"><div class="card-head-wrap"><div class="card-head-glow"></div><img class="card-head" id="h-${p.uuid}" src="${hUrl(p.uuid,64)}" alt="" width="48" height="48"></div><div><h3 class="card-name">${p.name}</h3><div class="card-status" style="color:${m.color}"><span class="status-dot" style="background:${p.online?m.color:'var(--text-muted)'}"></span>${p.online?m.label:'Offline'}</div></div></div><div class="risk-ring-wrap">${ringSVG(p.risk,56,3)}<div class="risk-ring-text"><span class="risk-ring-num" style="color:${rHex(p.risk)}">${p.risk}</span><span class="risk-ring-label">risk</span></div></div></div>${riskBarHTML(p.risk)}<div class="card-badges"><span class="badge ${p.alerts.length>2?'danger':''}">${p.alerts.length} alerts</span><span class="badge ${p.punishments.length?'warn':''}">${p.punishments.length} actions</span></div><div class="card-footer"><span class="card-time">${p.alerts.length?p.alerts[0].time:'—'}</span><button class="view-btn">Details →</button></div></div></div>`;}).join('');
  grid.querySelectorAll('.card').forEach(card=>{const glow=card.querySelector('.card-mouse-glow');card.addEventListener('mousemove',e=>{const r=card.getBoundingClientRect();glow.style.left=(e.clientX-r.left)+'px';glow.style.top=(e.clientY-r.top)+'px';});card.addEventListener('click',()=>openPanel(card.dataset.name));});
  filtered.forEach(p=>{const img=document.getElementById('h-'+p.uuid);if(img)hFallback(img,p.uuid,64);});
}

document.getElementById('filters').addEventListener('click',e=>{
  const pill=e.target.closest('.filter-pill');if(!pill)return;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  pill.classList.add('active');activeFilter=pill.dataset.filter;renderGrid();
});

const panel=document.getElementById('panel');

  document.getElementById('tab-alerts').innerHTML=p.alerts.length?`<div class="timeline">${p.alerts.map((a,i)=>`<div class="timeline-item" style="animation-delay:${i*70}ms"><div class="timeline-node ${a.severity}"></div><div class="tl-card"><p class="timeline-title">${a.check} <span class="vl-tag">VL ${a.vl}</span></p><div class="timeline-meta">${a.time}</div></div></div>`).join('')}</div>`:`<div class="empty-state"><div class="empty-icon">🛡️</div>No alerts recorded.</div>`;
  document.getElementById('tab-punishments').innerHTML=p.punishments.length?p.punishments.map((pu,i)=>`<div class="list-item" style="animation-delay:${i*70}ms"><div class="list-icon">⛔</div><div class="list-text"><p class="list-title">${pu.type}</p><div class="list-sub">${pu.detail}</div></div><div class="list-time">${pu.time}</div></div>`).join(''):`<div class="empty-state"><div class="empty-icon">⚖️</div>No punishment history.</div>`;
  document.getElementById('tab-staff').innerHTML=p.staffActions.length?p.staffActions.map((sa,i)=>`<div class="list-item" style="animation-delay:${i*70}ms"><div class="list-icon">👮</div><div class="list-text"><p class="list-title">${sa.action}</p><div class="list-sub">by ${sa.staff}</div></div><div class="list-time">${sa.time}</div></div>`).join(''):`<div class="empty-state"><div class="empty-icon">📋</div>No staff actions logged.</div>`;

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.querySelector('.tab[data-tab="alerts"]').classList.add('active');
  document.getElementById('tab-alerts').classList.add('active');
  overlay.classList.add('open');panel.classList.add('open');

function closePanel(){overlay.classList.remove('open');panel.classList.remove('open');currentPanelPlayer=null;}
overlay.addEventListener('click',closePanel);
document.getElementById('panelClose').addEventListener('click',closePanel);
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.activeElement!==termInput)closePanel();});

document.getElementById('tabs').addEventListener('click',e=>{
  const tab=e.target.closest('.tab');if(!tab)return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  tab.classList.add('active');document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
});

/* Panel quick actions → fill terminal */
document.getElementById('panelQuickActions').addEventListener('click',e=>{
  const btn=e.target.closest('.qaction');if(!btn)return;
  const name=currentPanelPlayer;if(!name)return;
  const cmd=btn.dataset.cmd.replace('{name}',name);

/* ======== TERMINAL ======== */
const termInput=document.getElementById('termInput');
const termSend=document.getElementById('termSend');
const termSugg=document.getElementById('termSugg');
const termLog=document.getElementById('termLog');
const termLogInner=document.getElementById('termLogInner');
const termToggle=document.getElementById('termToggle');
const CHECK_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const FAIL_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

const COMMANDS=[
  {cmd:'ban',desc:'Ban a player from the server',color:'danger'},
  {cmd:'tempban',desc:'Temporarily ban a player',color:'danger'},
  {cmd:'unban',desc:'Unban a player',color:'success'},
  {cmd:'kick',desc:'Kick a player',color:'warn'},
  {cmd:'mute',desc:'Mute a player in chat',color:'neutral'},
  {cmd:'tempmute',desc:'Temporarily mute a player',color:'neutral'},
  {cmd:'unmute',desc:'Unmute a player',color:'neutral'},
  {cmd:'freeze',desc:'Freeze a player in place',color:'cyan'},
  {cmd:'unfreeze',desc:'Unfreeze a player',color:'cyan'},
  {cmd:'ss',desc:'Start a screenshare check',color:'accent'},
  {cmd:'tp',desc:'Teleport to a player',color:'accent'},
  {cmd:'tphere',desc:'Teleport player to you',color:'accent'},
  {cmd:'gamemode',desc:'Change a player\'s gamemode',color:'neutral'},
  {cmd:'op',desc:'Grant operator status',color:'warn'},
  {cmd:'deop',desc:'Remove operator status',color:'neutral'},
  {cmd:'say',desc:'Broadcast a message',color:'accent'},
  {cmd:'whitelist',desc:'Manage the whitelist',color:'neutral'},
  {cmd:'vanish',desc:'Toggle vanish visibility',color:'cyan'},
];

let suggActiveIdx=-1;
let suggItems=[];

function hlMatch(text,query){
  if(!query)return text;
  const i=text.toLowerCase().indexOf(query.toLowerCase());
  if(i===-1)return text;
  return text.slice(0,i)+'<span class="sugg-hl">'+text.slice(i,i+query.length)+'</span>'+text.slice(i+query.length);
}

function showSuggestions(){
  const raw=termInput.value.trim();
  let query='';
  let inCommand=false;

  if(raw.startsWith('/')) query=raw.slice(1);
  else query=raw;

  const spaceIdx=query.indexOf(' ');
  if(spaceIdx!==-1){
    inCommand=true;
    query=query.slice(spaceIdx+1);
  }

  const qLow=query.toLowerCase();
  let cmdResults=[], playerResults=[];

  if(!inCommand){
    cmdResults=COMMANDS.filter(c=>c.cmd.startsWith(qLow)).slice(0,6);
  }

  playerResults=players.filter(p=>p.name.toLowerCase().includes(qLow)).slice(0,8);

  if(!inCommand&&!qLow){
    playerResults=players.slice(0,5);
  }

  if(!cmdResults.length&&!playerResults.length){
    termSugg.classList.remove('open');
    suggItems=[];suggActiveIdx=-1;
    return;
  }

  let html='';

  if(cmdResults.length){
    html+='<div class="sugg-section"><div class="sugg-section-label">Commands</div>';
    cmdResults.forEach(c=>{
      const insertText=inCommand?'':c.cmd+' ';
      html+=`<div class="sugg-item" data-insert="${insertText}" data-full="${c.cmd}"><span class="sugg-dot ${c.color}"></span><div class="sugg-text"><div class="sugg-name">${hlMatch(c.cmd,qLow)}</div><div class="sugg-desc">${c.desc}</div></div><span class="sugg-badge">cmd</span></div>`;
    });
    html+='</div>';
  }

  if(playerResults.length){
    html+='<div class="sugg-section"><div class="sugg-section-label">Players</div>';
    playerResults.forEach(p=>{
      const statusDot=p.online?'<span style="color:'+SM[p.status].color+'">●</span> ':'<span style="color:var(--text-muted)">●</span> ';
      html+=`<div class="sugg-item" data-insert="${p.name} " data-full="${p.name}"><span class="sugg-dot ${p.status==='banned'?'danger':p.status==='sus'?'warn':'accent'}"></span><div class="sugg-text"><div class="sugg-name">${statusDot}${hlMatch(p.name,qLow)}</div><div class="sugg-desc">${SM[p.status].label} · risk ${p.risk}</div></div><span class="sugg-badge" style="${p.online?'color:var(--success);border-color:rgba(52,211,153,0.15);background:var(--success-dim)':'color:var(--text-muted)'}">${p.online?'online':'offline'}</span></div>`;
    });
    html+='</div>';
  }

  termSugg.innerHTML=html;
  termSugg.classList.add('open');
  suggItems=[...termSugg.querySelectorAll('.sugg-item')];
  suggActiveIdx=-1;
  updateSuggHighlight();
}

function hideSuggestions(){termSugg.classList.remove('open');suggItems=[];suggActiveIdx=-1;}

function updateSuggHighlight(){
  suggItems.forEach((el,i)=>el.classList.toggle('active',i===suggActiveIdx));
  if(suggActiveIdx>=0&&suggItems[suggActiveIdx]){
    suggItems[suggActiveIdx].scrollIntoView({block:'nearest'});
  }
}

function applySuggestion(idx){
  if(idx<0||idx>=suggItems.length)return;
  const item=suggItems[idx];
  const insert=item.dataset.insert;

  const raw=termInput.value;
  const hasSlash=raw.startsWith('/');
  const spaceIdx=raw.indexOf(' ');
  const prefix=hasSlash?'/':'';

  if(spaceIdx!==-1){
    termInput.value=raw.slice(0,spaceIdx+1)+insert;
  } else {
    termInput.value=prefix+insert;
  }

  hideSuggestions();
  termInput.focus();
  showSuggestions();
}

termInput.addEventListener('focus',()=>{showSuggestions();});
termInput.addEventListener('input',()=>{showSuggestions();});
termInput.addEventListener('blur',()=>{setTimeout(hideSuggestions,150);});

termInput.addEventListener('keydown',e=>{
  if(!termSugg.classList.contains('open'))return;

  if(e.key==='ArrowDown'){
    e.preventDefault();
    suggActiveIdx=suggActiveIdx<suggItems.length-1?suggActiveIdx+1:0;
    updateSuggHighlight();
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    suggActiveIdx=suggActiveIdx>0?suggActiveIdx-1:suggItems.length-1;
    updateSuggHighlight();
  } else if(e.key==='Tab'){
    e.preventDefault();
    if(suggActiveIdx===-1)suggActiveIdx=0;
    applySuggestion(suggActiveIdx);
  } else if(e.key==='Enter'){
    if(suggActiveIdx>=0){
      e.preventDefault();
      applySuggestion(suggActiveIdx);
    }
  } else if(e.key==='Escape'){
    e.preventDefault();
    hideSuggestions();
  }
});

termSugg.addEventListener('mousedown',e=>{
  const item=e.target.closest('.sugg-item');
  if(item){
    e.preventDefault();
    const idx=suggItems.indexOf(item);
    applySuggestion(idx);
  }
});

/* Toggle log */
let logOpen=false;
termToggle.addEventListener('click',()=>{
  logOpen=!logOpen;
  termLog.classList.toggle('open',logOpen);
  termToggle.classList.toggle('open',logOpen);
});

/* Send command */
async function sendTerminalCmd(){
  const raw=termInput.value.trim();
  if(!raw)return;

  const cmdText=raw.startsWith('/')?raw.slice(1):raw;
  const playerGuess=cmdText.split(/\s+/)[1]||'__none__';

  termSend.disabled=true;
  hideSuggestions();

  const entry=document.createElement('div');
  entry.className='term-log-entry';
  entry.innerHTML=`<div class="tle-icon"><div class="tle-spinner"></div></div><span class="tle-cmd">/${cmdText}</span><span class="tle-time">just now</span>`;

  termLogInner.prepend(entry);
  if(!logOpen){logOpen=true;termLog.classList.add('open');termToggle.classList.add('open');}

  // .select().single() gets the inserted row back (including its id),
  // so the realtime update listener can match on a stable row id
  // instead of guessing "the first pending entry" - supports multiple
  // in-flight commands correctly.
  const{data,error}=await sb.from('command_queue').insert({
    player_name: playerGuess,
    command: cmdText,
    status: 'pending'
  }).select().single();

  if(error){
    entry.querySelector('.tle-icon').innerHTML=FAIL_SVG;
    const err=document.createElement('span');
    err.className='tle-result';
    err.textContent = error.message.includes('row-level security') ? 'Not authorized' : 'Queue failed';
    entry.appendChild(err);
  } else if (data) {
    entry.dataset.rowId = data.id;
  }

  termInput.value='';
  termSend.disabled=false;
  termInput.focus();
}

termSend.addEventListener('click',sendTerminalCmd);
termInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&suggActiveIdx===-1)sendTerminalCmd();
});

/* Global shortcut: press / anywhere to focus terminal (but not while typing in the login form) */
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==termInput&&authGate.classList.contains('hidden')){
    e.preventDefault();
    termInput.focus();
    termInput.value='/';
    showSuggestions();
  }
});

// Dashboard only starts once onAuthStateChange confirms a session exists
